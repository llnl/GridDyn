variables:
  griddyn.std: 14
  griddyn.build_type: Release
  griddyn.options:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  - job: macOS_latest
    pool:
      vmImage: "macOS-latest"
    steps:
      # -----------------------
      # Install dependencies
      # -----------------------

      - bash: brew install boost
        displayName: Install boost

      # -----------------------
      # Configure GRIDDYN
      # -----------------------
      - task: CMake@1
        inputs:
          cmakeArgs: -DGRIDDYN_BUILD_C_SHARED_LIBRARY=ON -DGRIDDYN_BUILD_TESTS=ON -DGRIDDYN_SUITESPARSE_FORCE_SUBPROJECT=ON ..
        displayName: "Configure GridDyn"

      # -----------------------
      # Build GridDyn
      # -----------------------
      - bash: cmake --build . --config Release
        displayName: "Build GridDyn"
        workingDirectory: build

      # -----------------------
      # Test GridDyn
      # -----------------------
      - bash: ctest --output-on-failure --timeout 480 -C Release -L "Continuous"
        displayName: "Test GridDyn"
        workingDirectory: build

  - job: macOS_14
    pool:
      vmImage: "macOS-14"
    steps:
      # -----------------------
      # Install dependencies
      # -----------------------

      - bash: brew install boost suite-sparse
        displayName: Install boost

      # -----------------------
      # Configure GRIDDYN
      # -----------------------
      - task: CMake@1
        inputs:
          cmakeArgs: -DGRIDDYN_BUILD_C_SHARED_LIBRARY=ON -DGRIDDYN_BUILD_TESTS=ON ..
        displayName: "Configure GridDyn"

      # -----------------------
      # Build GridDyn
      # -----------------------
      - bash: cmake --build . --config Release
        displayName: "Build GridDyn"
        workingDirectory: build

      # -----------------------
      # Test GridDyn
      # -----------------------
      - bash: ctest --output-on-failure --timeout 480 -C Release -L "Continuous"
        displayName: "Test GridDyn"
        workingDirectory: build
  # - job: Docker
  #   variables:
  #     griddyn.options:
  #   pool:
  #     v1mImage: "ubuntu-latest"
  #   strategy:
  #     matrix:
  #       helics:
  #         containerImage: helics/helics:builder
  #         griddyn.options: -DGRIDDYN_ENABLE_HELICS_EXECUTABLE=ON
  #   container: $[ variables['containerImage'] ]
  #   steps:
  #     - template: azure-build.yml
  #     - template: azure-test.yml

  - job: Windows
    strategy:
      matrix:
        VSlatest-64bit:
          imageName: "windows-latest"
          langArch: "x64"
          vsArch: "x64"
          extraFlags: "-DCMAKE_CXX_STANDARD=26"
        VS2022-64bit:
          imageName: "windows-2022"
          langArch: "x64"
          vsArch: "x64"
          extraFlags: "-DCMAKE_CXX_STANDARD=23"
    pool:
      vmImage: $(imageName)
    variables:
      BOOST_ROOT: $(Pipeline.Workspace)/ci-libs/boost
      BOOST_URL: https://sourceforge.net/projects/boost/files/boost/1.85.0/boost_1_85_0.tar.bz2/download

    steps:
      # -----------------------
      # Install dependencies
      # -----------------------
      - task: Cache@2
        inputs:
          path: $(BOOST_ROOT)
          key: boost
          cacheHitVar: BOOST_CACHE_RESTORED
        displayName: Restore Boost cache

      - bash: |
          cd "$(mktemp -d)"
          curl --location --output "download.tar.bz2" "$BOOST_URL"
          tar xfj "download.tar.bz2"
          mkdir -p "$BOOST_ROOT"
          cp -r boost_*/* "$BOOST_ROOT"
        condition: ne(variables.BOOST_CACHE_RESTORED, 'true')
        displayName: Install Boost

      - bash: choco install swig --yes --limit-output
        condition: eq( variables['Agent.OS'], 'Windows_NT' )
        displayName: Install swig

      - bash: choco install nsis --yes --limit-output
        condition: eq( variables['Agent.OS'], 'Windows_NT' )
        displayName: Install NSIS

      - task: UsePythonVersion@0
        inputs:
          versionSpec: "3.13"
          addToPath: true
          architecture: $(langArch)

      - bash: pip3 install pytest
        displayName: Install pytest

      # -----------------------
      # Configure GRIDDYN
      # -----------------------
      - bash: |
          echo "BOOST_ROOT=$BOOST_ROOT"
          env
        displayName: Show environment info
      - task: CMake@1
        inputs:
          cmakeArgs: -A $(vsArch) -DBOOST_INSTALL_PATH=$(BOOST_ROOT) -DGRIDDYN_BUILD_C_SHARED_LIBRARY=ON -DGRIDDYN_ENABLE_PACKAGE_BUILD=ON -DGRIDDYN_BUILD_TESTS=ON $(extraFlags) ..
        displayName: "Configure GridDyn"
        condition: eq( variables['Agent.OS'], 'Windows_NT' )

      #  - task: CMake@1
      #    inputs:
      #      cmakeArgs: -DBUILD_PYTHON_INTERFACE=ON .
      #    displayName: 'Configure Python interface'
      #    condition: and(ne( variables['imageName'], 'vs2015-win2012r2' ), eq( variables['langArch'], 'x64' ))

      #  - task: CMake@1
      #    inputs:
      #      cmakeArgs: -DBUILD_JAVA_INTERFACE=ON .
      #    displayName: 'Configure Java interface'
      #    condition: eq( variables['langArch'], 'x64' )

      # -----------------------
      # Build GridDyn
      # -----------------------
      - bash: cmake --build . --config Release
        displayName: "Build GridDyn"
        workingDirectory: build

      # -----------------------
      # Package GridDyn
      # -----------------------
      - bash: |
          cpack_dir="$(which cmake)"
          cpack_dir="${cpack_dir%/cmake}"
          "${cpack_dir}/cpack" -G "NSIS" -C Release -B "$PWD/installer-output"
        displayName: "Package GridDyn"
        workingDirectory: build

      - task: CopyFiles@2
        inputs:
          sourceFolder: "$(Build.SourcesDirectory)/build/installer-output"
          contents: "*.exe"
          TargetFolder: "$(Build.ArtifactStagingDirectory)"

      - task: PublishBuildArtifacts@1
        inputs:
          pathtoPublish: "$(Build.ArtifactStagingDirectory)"
          artifactName: installer

      # -----------------------
      # Test GridDyn
      # -----------------------
      - bash: ctest --output-on-failure --timeout 480 -C Release -L "Continuous"
        displayName: "Test GridDyn"
        workingDirectory: build
